<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Device | EuclidOS</title>
    <meta name="description" content="EuclidOS device details - downloads, changelog, and flashing instructions.">
    <link rel="icon" type="image/jpeg" href="assets/screenshots/logo.jpeg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/lenis@1.1.13/dist/lenis.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        euclid: '#4d78ff',
                        'euclid-dark': '#03030a',
                        'euclid-muted': '#8888a0',
                        'euclid-dim': 'rgba(77, 120, 255, 0.1)',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Space Grotesk', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --clr-primary: #4d78ff;
            --clr-primary-dim: rgba(77, 120, 255, 0.1);
            --bg-main: #03030a;
            --glass-border: rgba(255, 255, 255, 0.06);
            --glass-border-hover: rgba(255, 255, 255, 0.12);
            --glow: #9ea8ff;
            --accent-cyan: #00f0ff;
            --text-muted: #8888a0;
            --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            background-color: var(--bg-main);
            color: #f0f0f5;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 10px; }
        #noise-overlay {
            position: fixed; inset: 0;
            pointer-events: none; z-index: 9999;
            opacity: 0.025;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }
        #scroll-progress {
            position: fixed; top: 0; left: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--clr-primary), var(--accent-cyan));
            z-index: 10001; width: 0%;
            box-shadow: 0 0 12px var(--clr-primary);
        }
        .glass {
            background: rgba(10, 10, 20, 0.6);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid var(--glass-border);
        }
        .glass-card {
            background: rgba(16, 16, 30, 0.5);
            backdrop-filter: blur(20px) saturate(150%);
            -webkit-backdrop-filter: blur(20px) saturate(150%);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.04);
            transition: all 0.5s var(--ease-out);
        }
        .glass-card:hover {
            border-color: var(--glass-border-hover);
            box-shadow: 0 16px 48px rgba(0,0,0,0.4), 0 0 40px var(--clr-primary-dim), inset 0 1px 0 rgba(255,255,255,0.08);
        }
        #ambient-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; pointer-events: none; overflow: hidden;
        }
        .ambient-blob {
            position: absolute; border-radius: 50%;
            filter: blur(120px); opacity: 0.3;
            animation: ambientFloat 25s ease-in-out infinite alternate;
            will-change: transform;
        }
        @keyframes ambientFloat {
            0%   { transform: translate(0, 0) scale(1); }
            25%  { transform: translate(40px, -60px) scale(1.05); }
            50%  { transform: translate(-30px, 40px) scale(0.95); }
            75%  { transform: translate(20px, -30px) scale(1.08); }
            100% { transform: translate(-20px, 20px) scale(1); }
        }
        .reveal-section { opacity: 0; transform: translateY(30px); }
        #navbar { transition: transform 0.4s var(--ease-out), opacity 0.4s var(--ease-out); will-change: transform; }
        #nav-glass { transition: opacity 0.4s var(--ease-out); }
        .nav-link {
            position: relative; padding: 8px 16px;
            font-size: 13px; font-weight: 500;
            color: rgba(255,255,255,0.6);
            border-radius: 9999px;
            transition: color 0.3s, background-color 0.3s;
        }
        .nav-link:hover { color: #fff; background-color: rgba(255,255,255,0.08); }
        .nav-link::after {
            content: ''; position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%);
            width: 0; height: 1px; background: var(--clr-primary);
            transition: width 0.3s var(--ease-out);
        }
        .nav-link:hover::after { width: 16px; }
        .ham-btn {
            width: 44px; height: 44px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 5px; position: relative;
            border-radius: 12px; background: transparent;
            border: 1px solid transparent;
            transition: all 0.4s var(--ease-out);
            -webkit-tap-highlight-color: transparent; cursor: pointer;
        }
        .ham-btn:active { transform: scale(0.92); }
        .ham-btn .ham-line {
            display: block; width: 20px; height: 1.5px;
            background: white; border-radius: 4px;
            transition: all 0.5s var(--ease-out);
            transform-origin: center; position: absolute;
        }
        .ham-btn .ham-line:nth-child(1) { transform: translateY(-6px); }
        .ham-btn .ham-line:nth-child(2) { transform: translateY(0); }
        .ham-btn .ham-line:nth-child(3) { transform: translateY(6px); }
        .ham-btn.ham-open .ham-line:nth-child(1) { transform: translateY(0) rotate(45deg); }
        .ham-btn.ham-open .ham-line:nth-child(2) { opacity: 0; transform: scaleX(0); }
        .ham-btn.ham-open .ham-line:nth-child(3) { transform: translateY(0) rotate(-45deg); }
        .ham-btn.ham-open { background: rgba(77,120,255,0.12); border-color: rgba(77,120,255,0.25); }
        .ham-btn .ham-glow {
            position: absolute; inset: -4px; border-radius: 16px;
            background: radial-gradient(circle, rgba(77,120,255,0.25), transparent 70%);
            opacity: 0; transition: opacity 0.4s; pointer-events: none;
        }
        .ham-btn.ham-open .ham-glow { opacity: 1; }
        .mobile-menu-overlay { position: fixed; inset: 0; pointer-events: none; }
        .mobile-menu-overlay.active { pointer-events: auto; }
        .menu-backdrop {
            position: absolute; inset: 0;
            background: rgba(2,2,8,0.7);
            backdrop-filter: blur(12px) saturate(120%);
            -webkit-backdrop-filter: blur(12px) saturate(120%);
            opacity: 0; transition: opacity 0.5s var(--ease-out);
        }
        .mobile-menu-overlay.active .menu-backdrop { opacity: 1; }
        .menu-panel {
            position: absolute; inset: 0;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 80px 32px 48px;
            opacity: 0; transform: scale(0.96);
            transition: all 0.5s var(--ease-out); pointer-events: none;
        }
        .mobile-menu-overlay.active .menu-panel { opacity: 1; transform: scale(1); pointer-events: auto; }
        .menu-ambient {
            position: absolute; border-radius: 50%;
            filter: blur(100px); opacity: 0;
            transition: opacity 0.8s var(--ease-out); pointer-events: none;
        }
        .mobile-menu-overlay.active .menu-ambient { opacity: 1; }
        .menu-nav-item {
            display: block; font-family: var(--font-display);
            font-size: clamp(1.75rem, 6vw, 2.5rem); font-weight: 600;
            color: rgba(255,255,255,0.35); padding: 12px 0;
            text-decoration: none; position: relative;
            opacity: 0; transform: translateY(20px);
            transition: color 0.3s var(--ease-out);
            -webkit-tap-highlight-color: transparent;
        }
        .menu-nav-item:hover, .menu-nav-item:active { color: white; }
        .menu-nav-item::after {
            content: ''; position: absolute; left: 0; bottom: 4px;
            width: 0; height: 2px;
            background: linear-gradient(90deg, var(--clr-primary), var(--accent-cyan));
            border-radius: 2px; transition: width 0.4s var(--ease-out);
            box-shadow: 0 0 8px var(--clr-primary);
        }
        .menu-nav-item:hover::after, .menu-nav-item:active::after { width: 100%; }
        .menu-nav-item .item-index {
            display: inline-block; font-size: 10px; font-family: var(--font-base);
            font-weight: 500; color: var(--clr-primary);
            margin-right: 12px; min-width: 20px; letter-spacing: 0.05em;
        }
        .menu-nav-item .item-arrow {
            display: inline-block; margin-left: 12px;
            opacity: 0; transform: translateX(-8px);
            transition: all 0.3s var(--ease-out);
        }
        .menu-nav-item:hover .item-arrow { opacity: 0.5; transform: translateX(0); }
        .menu-cta-btn {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 14px 36px; background: var(--clr-primary);
            color: white; font-weight: 600; font-size: 15px;
            border-radius: 9999px; text-decoration: none;
            opacity: 0; transform: translateY(20px);
            box-shadow: 0 0 30px rgba(77,120,255,0.25);
            transition: transform 0.3s var(--ease-out);
            -webkit-tap-highlight-color: transparent;
        }
        .menu-cta-btn:active { transform: scale(0.96) translateY(0); }
        .magnetic-btn {
            position: relative; overflow: hidden;
            transition: transform 0.4s var(--ease-out), box-shadow 0.4s var(--ease-out);
        }
        .magnetic-btn::before {
            content: ''; position: absolute; top: 50%; left: 50%;
            width: 0; height: 0; border-radius: 50%;
            background: rgba(255,255,255,0.15); transform: translate(-50%, -50%);
            transition: width 0.6s var(--ease-out), height 0.6s var(--ease-out);
        }
        .magnetic-btn:hover::before { width: 300%; height: 300%; }
        ::selection { background: rgba(77, 120, 255, 0.3); color: white; }

        /* Tabs */
        .tab-btn {
            padding: 10px 20px;
            border-radius: 9999px;
            font-size: 13px;
            font-weight: 500;
            border: 1px solid var(--glass-border);
            background: rgba(16, 16, 30, 0.4);
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            transition: all 0.3s var(--ease-out);
        }
        .tab-btn:hover {
            border-color: var(--glass-border-hover);
            color: white;
        }
        .tab-btn.active {
            background: rgba(77, 120, 255, 0.15);
            border-color: rgba(77, 120, 255, 0.4);
            color: var(--clr-primary);
        }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* Markdown rendered content */
        .md-content h1 { font-size: 1.5rem; font-weight: 700; color: white; margin: 0 0 1rem 0; font-family: 'Space Grotesk', sans-serif; }
        .md-content h2 { font-size: 1.25rem; font-weight: 600; color: white; margin: 1.5rem 0 0.75rem 0; font-family: 'Space Grotesk', sans-serif; }
        .md-content h3 { font-size: 1.1rem; font-weight: 600; color: white; margin: 1.25rem 0 0.5rem 0; }
        .md-content p { color: rgba(255,255,255,0.7); margin: 0.5rem 0; line-height: 1.7; font-size: 0.875rem; }
        .md-content ul, .md-content ol { color: rgba(255,255,255,0.7); margin: 0.5rem 0; padding-left: 1.5rem; font-size: 0.875rem; line-height: 1.8; }
        .md-content li { margin: 0.25rem 0; }
        .md-content li::marker { color: var(--clr-primary); }
        .md-content strong { color: white; font-weight: 600; }
        .md-content em { color: rgba(255,255,255,0.6); }
        .md-content a { color: var(--clr-primary); text-decoration: underline; text-underline-offset: 2px; }
        .md-content a:hover { color: #6b9aff; }
        .md-content code {
            background: rgba(77, 120, 255, 0.1);
            border: 1px solid rgba(77, 120, 255, 0.2);
            padding: 2px 6px; border-radius: 4px;
            font-size: 0.8rem; font-family: 'JetBrains Mono', monospace;
            color: #a5b4fc;
        }
        .md-content pre {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1rem;
            overflow-x: auto;
            margin: 1rem 0;
        }
        .md-content pre code {
            background: none; border: none; padding: 0;
            color: rgba(255,255,255,0.8);
            font-size: 0.8rem;
        }
        .md-content blockquote {
            border-left: 3px solid var(--clr-primary);
            padding: 0.5rem 1rem;
            margin: 1rem 0;
            background: rgba(77, 120, 255, 0.05);
            border-radius: 0 8px 8px 0;
            color: rgba(255,255,255,0.7);
        }
        .md-content hr {
            border: none;
            border-top: 1px solid var(--glass-border);
            margin: 1.5rem 0;
        }
        .md-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
            font-size: 0.85rem;
        }
        .md-content th {
            text-align: left;
            padding: 0.75rem 1rem;
            border-bottom: 2px solid rgba(77, 120, 255, 0.3);
            color: white;
            font-weight: 600;
        }
        .md-content td {
            padding: 0.6rem 1rem;
            border-bottom: 1px solid var(--glass-border);
            color: rgba(255,255,255,0.7);
        }

        /* Loading skeleton */
        .skeleton {
            background: linear-gradient(90deg, rgba(16,16,30,0.5) 25%, rgba(30,30,50,0.5) 50%, rgba(16,16,30,0.5) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body style="background: linear-gradient(180deg, #020208 0%, #06060e 50%, #0a0a14 100%);">

    <div id="ambient-bg">
        <div class="ambient-blob" style="width: 600px; height: 600px; background: radial-gradient(circle, rgba(77,120,255,0.4) 0%, transparent 70%); top: -200px; left: -100px;"></div>
        <div class="ambient-blob" style="width: 500px; height: 500px; background: radial-gradient(circle, rgba(108,92,231,0.3) 0%, transparent 70%); top: 30%; right: -200px; animation-delay: -8s;"></div>
        <div class="ambient-blob" style="width: 400px; height: 400px; background: radial-gradient(circle, rgba(0,123,255,0.25) 0%, transparent 70%); top: 60%; left: -100px; animation-delay: -14s;"></div>
    </div>
    <div id="noise-overlay"></div>
    <div id="scroll-progress"></div>

    <div id="app"></div>

    <script src="js/app.js"></script>
    <script>
    (function() {
        'use strict';

        const app = document.getElementById('app');
        const params = new URLSearchParams(window.location.search);
        const codename = params.get('codename');

        async function init() {
            if (!codename) {
                show404();
                return;
            }

            const device = await EuclidApp.getDevice(codename);
            if (!device) {
                show404();
                return;
            }

            document.title = `${device.device_name} | EuclidOS`;

            const [downloadInfo, changelog, instructions] = await Promise.all([
                EuclidApp.getDownloadInfo(codename),
                EuclidApp.getChangelog(codename),
                EuclidApp.getInstructions(codename)
            ]);

            const hasDownload = !!downloadInfo;
            const hasChangelog = !!changelog;
            const hasInstructions = !!instructions;

            app.innerHTML = `
                ${EuclidApp.buildNavbar('devices')}
                ${EuclidApp.buildMobileMenu('devices')}

                <!-- Hero Section -->
                <header class="relative pt-32 pb-16 px-6 text-center overflow-hidden">
                    <div class="absolute inset-0 z-0">
                        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-euclid/10 rounded-full blur-[120px] pointer-events-none"></div>
                    </div>
                    <div class="relative z-10 max-w-4xl mx-auto">
                        <a href="devices.html" class="inline-flex items-center gap-2 text-sm text-euclid-muted hover:text-white transition-colors mb-6 reveal-section">
                            <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
                            All Devices
                        </a>
                        <div class="flex flex-col items-center">
                            <div class="relative mb-6 reveal-section">
                                <div class="w-20 h-20 md:w-24 md:h-24 bg-gradient-to-br from-euclid/15 to-white/[0.03] rounded-2xl flex items-center justify-center border border-white/[0.06] relative">
                                    <span class="text-4xl md:text-5xl">&#128241;</span>
                                    ${device.active ? '<div class="absolute -top-1.5 -right-1.5 w-4 h-4 bg-green-400 rounded-full border-[3px] border-[#03030a] shadow-lg shadow-green-400/30"></div>' : '<div class="absolute -top-1.5 -right-1.5 w-4 h-4 bg-red-400/70 rounded-full border-[3px] border-[#03030a]"></div>'}
                                </div>
                            </div>
                            <h1 class="text-3xl md:text-5xl lg:text-6xl font-display font-bold mb-3 reveal-section leading-[1.1]">
                                ${device.device_name}
                            </h1>
                            <div class="flex flex-wrap items-center justify-center gap-3 mb-5 reveal-section">
                                <span class="px-3 py-1 rounded-full text-xs font-mono border border-white/10 text-gray-400 bg-white/[0.03]">${device.codename}</span>
                                <span class="px-3 py-1 rounded-full text-xs font-medium border border-white/10 text-gray-300 bg-white/[0.03]">${device.vendor}</span>
                                ${EuclidApp.statusBadge(device.active)}
                            </div>
                            <p class="text-sm text-euclid-muted reveal-section">
                                Maintained by <span class="text-white font-medium">${device.maintainer}</span>
                            </p>
                        </div>
                    </div>
                </header>

                <!-- Main Content -->
                <main class="max-w-4xl mx-auto px-6 pb-28 relative z-10">

                    <!-- Maintainer Section -->
                    <section class="glass-card rounded-[2rem] p-7 md:p-8 mb-8 reveal-section">
                        <h2 class="text-lg font-display font-bold text-white mb-5 flex items-center gap-2">
                            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                            Maintainer
                        </h2>
                        <div class="flex flex-col sm:flex-row items-start sm:items-center gap-4">
                            <div class="flex-1">
                                <p class="text-white font-semibold text-lg">${device.maintainer}</p>
                                <p class="text-sm text-euclid-muted">Device maintainer for ${device.device_name}</p>
                            </div>
                            <div class="flex flex-wrap gap-2">
                                ${device.maintainer_telegram ? `
                                <a href="https://${device.maintainer_telegram}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-2 px-4 py-2.5 rounded-full border border-white/10 bg-white/[0.03] text-white/70 text-sm font-medium hover:bg-blue-500/10 hover:border-blue-500/30 hover:text-blue-400 transition-all duration-300">
                                    <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>
                                    Telegram
                                </a>` : ''}
                                ${device.maintainer_github ? `
                                <a href="https://${device.maintainer_github}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-2 px-4 py-2.5 rounded-full border border-white/10 bg-white/[0.03] text-white/70 text-sm font-medium hover:bg-white/10 hover:border-white/20 hover:text-white transition-all duration-300">
                                    <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                                    GitHub
                                </a>` : ''}
                                ${device.support_group ? `
                                <a href="https://${device.support_group}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-2 px-4 py-2.5 rounded-full border border-white/10 bg-white/[0.03] text-white/70 text-sm font-medium hover:bg-cyan-500/10 hover:border-cyan-500/30 hover:text-cyan-400 transition-all duration-300">
                                    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                                    Support Group
                                </a>` : ''}
                            </div>
                        </div>
                    </section>

                    <!-- Download Section (if available) -->
                    ${hasDownload ? `
                    <section class="glass-card rounded-[2rem] p-7 md:p-8 mb-8 reveal-section">
                        <h2 class="text-lg font-display font-bold text-white mb-5 flex items-center gap-2">
                            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                            Download
                        </h2>
                        <div class="flex flex-col sm:flex-row items-start sm:items-center gap-4 mb-5">
                            <div class="flex-1">
                                <div class="flex items-center gap-3 mb-2">
                                    <span class="text-2xl font-display font-bold text-white">${downloadInfo.version}</span>
                                    ${EuclidApp.downloadStatusBadge(downloadInfo.status)}
                                </div>
                                <p class="text-xs text-gray-500">Last updated: ${EuclidApp.formatDate(downloadInfo.last_updated)}</p>
                            </div>
                        </div>
                        <div class="flex flex-col sm:flex-row gap-3">
                            <a href="${downloadInfo.download_link}" target="_blank" rel="noopener noreferrer" class="magnetic-btn flex-1 py-3.5 bg-euclid text-white font-semibold rounded-xl text-center shadow-lg shadow-euclid/15 hover:shadow-euclid/30 hover:scale-[1.02] transition-all duration-300 text-sm relative z-10">
                                Download Build
                            </a>
                            ${downloadInfo.mirror_link ? `
                            <a href="${downloadInfo.mirror_link}" target="_blank" rel="noopener noreferrer" class="flex-1 py-3.5 border border-white/[0.08] text-white/90 font-semibold rounded-xl text-center hover:border-white/20 hover:bg-white/[0.03] transition-all duration-300 text-sm">
                                Mirror
                            </a>` : ''}
                        </div>
                    </section>
                    ` : ''}

                    <!-- Tabs: Changelog + Instructions -->
                    ${(hasChangelog || hasInstructions) ? `
                    <section class="reveal-section">
                        <div class="flex flex-wrap gap-2 mb-6">
                            ${hasChangelog ? '<button class="tab-btn active" data-tab="changelog">Changelog</button>' : ''}
                            ${hasInstructions ? `<button class="tab-btn ${!hasChangelog ? 'active' : ''}" data-tab="instructions">Flashing Instructions</button>` : ''}
                        </div>

                        ${hasChangelog ? `
                        <div class="tab-panel active glass-card rounded-[2rem] p-7 md:p-8" id="tab-changelog">
                            <h2 class="text-lg font-display font-bold text-white mb-5 flex items-center gap-2">
                                <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                                Changelog
                            </h2>
                            <div class="md-content">${EuclidApp.renderMarkdown(changelog)}</div>
                        </div>` : ''}

                        ${hasInstructions ? `
                        <div class="tab-panel glass-card rounded-[2rem] p-7 md:p-8 ${!hasChangelog ? 'active' : ''}" id="tab-instructions">
                            <h2 class="text-lg font-display font-bold text-white mb-5 flex items-center gap-2">
                                <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                                Flashing Instructions
                            </h2>
                            <div class="md-content">${EuclidApp.renderMarkdown(instructions)}</div>
                        </div>` : ''}
                    </section>
                    ` : ''}

                    <!-- No data available -->
                    ${!hasDownload && !hasChangelog && !hasInstructions ? `
                    <div class="glass-card rounded-[2rem] p-10 text-center reveal-section">
                        <div class="text-5xl mb-4 opacity-30">&#128196;</div>
                        <h3 class="text-xl font-display font-bold text-gray-500 mb-2">No data available yet</h3>
                        <p class="text-sm text-gray-600 mb-6">Check back later for downloads, changelogs, and instructions.</p>
                        <a href="devices.html" class="inline-flex items-center gap-2 px-6 py-3 bg-euclid/10 text-euclid font-semibold rounded-xl border border-euclid/20 hover:bg-euclid/20 transition-all duration-300 text-sm">
                            <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
                            Browse Other Devices
                        </a>
                    </div>
                    ` : ''}
                </main>

                ${EuclidApp.buildFooter()}
            `;

            // Tab switching
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
                });
            });

            EuclidApp.initUI();
        }

        function show404() {
            document.title = 'Device Not Found | EuclidOS';
            app.innerHTML = `
                ${EuclidApp.buildNavbar('devices')}
                ${EuclidApp.buildMobileMenu('devices')}

                <header class="relative pt-32 pb-20 px-6 text-center overflow-hidden min-h-[60vh] flex items-center">
                    <div class="absolute inset-0 z-0">
                        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[400px] h-[400px] bg-red-500/5 rounded-full blur-[120px] pointer-events-none"></div>
                    </div>
                    <div class="relative z-10 max-w-2xl mx-auto">
                        <div class="text-8xl mb-6 opacity-20">&#128533;</div>
                        <h1 class="text-4xl md:text-6xl font-display font-bold text-white mb-4">Device Not Found</h1>
                        <p class="text-lg text-euclid-muted mb-8">The device you're looking for doesn't exist or may have been removed.</p>
                        <div class="flex flex-col sm:flex-row items-center justify-center gap-3">
                            <a href="devices.html" class="magnetic-btn px-8 py-3.5 bg-euclid text-white font-semibold rounded-full shadow-lg shadow-euclid/20 hover:shadow-euclid/40 transition-all duration-300 hover:-translate-y-0.5 relative z-10">
                                Browse All Devices
                            </a>
                            <a href="index.html" class="px-8 py-3.5 border border-white/10 rounded-full font-medium text-white/70 hover:text-white hover:border-white/20 transition-all duration-300">
                                Go Home
                            </a>
                        </div>
                    </div>
                </header>

                ${EuclidApp.buildFooter()}
            `;
            EuclidApp.initUI();
        }

        init();
    })();
    </script>
</body>
</html>
