<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | EuclidOS</title>
    <link rel="icon" type="image/jpeg" href="assets/screenshots/logo.jpeg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/lenis@1.1.13/dist/lenis.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        euclid: '#4d78ff',
                        'euclid-dark': '#03030a',
                        'euclid-muted': '#8888a0',
                        'euclid-dim': 'rgba(77, 120, 255, 0.1)',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Space Grotesk', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --clr-primary: #4d78ff;
            --clr-primary-dim: rgba(77, 120, 255, 0.1);
            --bg-main: #03030a;
            --glass-border: rgba(255, 255, 255, 0.06);
            --glass-border-hover: rgba(255, 255, 255, 0.12);
            --glow: #9ea8ff;
            --accent-cyan: #00f0ff;
            --text-muted: #8888a0;
            --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            background-color: var(--bg-main);
            color: #f0f0f5;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 10px; }
        #noise-overlay {
            position: fixed; inset: 0;
            pointer-events: none; z-index: 9999;
            opacity: 0.025;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }
        #scroll-progress {
            position: fixed; top: 0; left: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--clr-primary), var(--accent-cyan));
            z-index: 10001; width: 0%;
            box-shadow: 0 0 12px var(--clr-primary);
        }
        .glass {
            background: rgba(10, 10, 20, 0.6);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid var(--glass-border);
        }
        /* ─── Aura Background System ─── */
        #aura-bg {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 0; pointer-events: none; overflow: hidden;
        }
        .aura-blob {
            position: absolute; border-radius: 50%;
            will-change: transform, opacity;
            filter: blur(150px);
            mix-blend-mode: screen;
        }
        .aura-blob-1 {
            width: 950px; height: 950px;
            background: radial-gradient(circle, rgba(77,120,255,0.42) 0%, rgba(77,120,255,0.1) 35%, transparent 70%);
            top: -280px; left: -200px;
            animation: auraDrift1 20s ease-in-out infinite alternate;
        }
        .aura-blob-2 {
            width: 800px; height: 800px;
            background: radial-gradient(circle, rgba(108,92,231,0.36) 0%, rgba(108,92,231,0.08) 35%, transparent 70%);
            top: 15%; right: -250px;
            animation: auraDrift2 28s ease-in-out infinite alternate;
        }
        .aura-blob-3 {
            width: 700px; height: 700px;
            background: radial-gradient(circle, rgba(0,123,255,0.34) 0%, rgba(0,123,255,0.07) 35%, transparent 70%);
            top: 50%; left: -180px;
            animation: auraDrift3 38s ease-in-out infinite alternate;
        }
        .aura-blob-4 {
            width: 850px; height: 850px;
            background: radial-gradient(circle, rgba(0,240,255,0.25) 0%, rgba(0,240,255,0.06) 35%, transparent 70%);
            bottom: -220px; right: -200px;
            animation: auraDrift4 14s ease-in-out infinite alternate;
        }
        .aura-blob-5 {
            width: 650px; height: 650px;
            background: radial-gradient(circle, rgba(138,79,255,0.28) 0%, rgba(138,79,255,0.06) 35%, transparent 70%);
            top: 35%; left: 40%;
            animation: auraDrift5 24s ease-in-out infinite alternate;
        }
        .aura-blob-6 {
            width: 550px; height: 550px;
            background: radial-gradient(circle, rgba(59,130,246,0.22) 0%, rgba(59,130,246,0.05) 35%, transparent 70%);
            top: 70%; left: 55%;
            animation: auraDrift6 32s ease-in-out infinite alternate;
        }

        @keyframes auraDrift1 {
            0%   { transform: translate3d(0, 0, 0) scale(1) rotate(0deg); }
            25%  { transform: translate3d(180px, -220px, 0) scale(1.12) rotate(10deg); }
            50%  { transform: translate3d(-140px, 160px, 0) scale(0.88) rotate(-8deg); }
            75%  { transform: translate3d(100px, -120px, 0) scale(1.18) rotate(14deg); }
            100% { transform: translate3d(-100px, 100px, 0) scale(1) rotate(0deg); }
        }
        @keyframes auraDrift2 {
            0%   { transform: translate3d(0, 0, 0) scale(1) rotate(0deg); }
            30%  { transform: translate3d(-240px, 180px, 0) scale(1.14) rotate(-12deg); }
            60%  { transform: translate3d(170px, -150px, 0) scale(0.86) rotate(10deg); }
            100% { transform: translate3d(-80px, 120px, 0) scale(1.08) rotate(-4deg); }
        }
        @keyframes auraDrift3 {
            0%   { transform: translate3d(0, 0, 0) scale(1) rotate(0deg); }
            20%  { transform: translate3d(150px, 200px, 0) scale(1.1) rotate(8deg); }
            50%  { transform: translate3d(-200px, -100px, 0) scale(0.88) rotate(-12deg); }
            80%  { transform: translate3d(130px, -170px, 0) scale(1.16) rotate(14deg); }
            100% { transform: translate3d(-60px, 80px, 0) scale(1) rotate(0deg); }
        }
        @keyframes auraDrift4 {
            0%   { transform: translate3d(0, 0, 0) scale(1) rotate(0deg); }
            35%  { transform: translate3d(-210px, -190px, 0) scale(1.16) rotate(-14deg); }
            70%  { transform: translate3d(170px, 130px, 0) scale(0.86) rotate(12deg); }
            100% { transform: translate3d(-100px, -80px, 0) scale(1.08) rotate(-4deg); }
        }
        @keyframes auraDrift5 {
            0%   { transform: translate3d(0, 0, 0) scale(1) rotate(0deg); }
            40%  { transform: translate3d(-180px, 230px, 0) scale(1.12) rotate(10deg); }
            75%  { transform: translate3d(220px, -130px, 0) scale(0.85) rotate(-14deg); }
            100% { transform: translate3d(-80px, 150px, 0) scale(1.1) rotate(4deg); }
        }
        @keyframes auraDrift6 {
            0%   { transform: translate3d(0, 0, 0) scale(1) rotate(0deg); }
            25%  { transform: translate3d(130px, -210px, 0) scale(1.14) rotate(-10deg); }
            55%  { transform: translate3d(-150px, 170px, 0) scale(0.87) rotate(14deg); }
            85%  { transform: translate3d(190px, 80px, 0) scale(1.08) rotate(-8deg); }
            100% { transform: translate3d(-60px, -100px, 0) scale(1) rotate(0deg); }
        }
        .reveal-section { opacity: 0; transform: translateY(30px); }
        #navbar { transition: transform 0.4s var(--ease-out), opacity 0.4s var(--ease-out); will-change: transform; }
        #nav-glass { transition: opacity 0.4s var(--ease-out); }
        .nav-link {
            position: relative; padding: 8px 16px;
            font-size: 13px; font-weight: 500;
            color: rgba(255,255,255,0.6);
            border-radius: 9999px;
            transition: color 0.3s, background-color 0.3s;
        }
        .nav-link:hover { color: #fff; background-color: rgba(255,255,255,0.08); }
        .nav-link::after {
            content: ''; position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%);
            width: 0; height: 1px; background: var(--clr-primary);
            transition: width 0.3s var(--ease-out);
        }
        .nav-link:hover::after { width: 16px; }
        .ham-btn {
            width: 44px; height: 44px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 5px; position: relative;
            border-radius: 12px; background: transparent;
            border: 1px solid transparent;
            transition: all 0.4s var(--ease-out);
            -webkit-tap-highlight-color: transparent; cursor: pointer;
        }
        .ham-btn:active { transform: scale(0.92); }
        .ham-btn .ham-line {
            display: block; width: 20px; height: 1.5px;
            background: white; border-radius: 4px;
            transition: all 0.5s var(--ease-out);
            transform-origin: center; position: absolute;
        }
        .ham-btn .ham-line:nth-child(1) { transform: translateY(-6px); }
        .ham-btn .ham-line:nth-child(2) { transform: translateY(0); }
        .ham-btn .ham-line:nth-child(3) { transform: translateY(6px); }
        .ham-btn.ham-open .ham-line:nth-child(1) { transform: translateY(0) rotate(45deg); }
        .ham-btn.ham-open .ham-line:nth-child(2) { opacity: 0; transform: scaleX(0); }
        .ham-btn.ham-open .ham-line:nth-child(3) { transform: translateY(0) rotate(-45deg); }
        .ham-btn.ham-open { background: rgba(77,120,255,0.12); border-color: rgba(77,120,255,0.25); }
        .ham-btn .ham-glow {
            position: absolute; inset: -4px; border-radius: 16px;
            background: radial-gradient(circle, rgba(77,120,255,0.25), transparent 70%);
            opacity: 0; transition: opacity 0.4s; pointer-events: none;
        }
        .ham-btn.ham-open .ham-glow { opacity: 1; }
        .mobile-menu-overlay { position: fixed; inset: 0; pointer-events: none; }
        .mobile-menu-overlay.active { pointer-events: auto; }
        .menu-backdrop {
            position: absolute; inset: 0;
            background: rgba(2,2,8,0.7);
            backdrop-filter: blur(12px) saturate(120%);
            -webkit-backdrop-filter: blur(12px) saturate(120%);
            opacity: 0; transition: opacity 0.5s var(--ease-out);
        }
        .mobile-menu-overlay.active .menu-backdrop { opacity: 1; }
        .menu-panel {
            position: absolute; inset: 0;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 80px 32px 48px;
            opacity: 0; transform: scale(0.96);
            transition: all 0.5s var(--ease-out); pointer-events: none;
        }
        .mobile-menu-overlay.active .menu-panel { opacity: 1; transform: scale(1); pointer-events: auto; }
        .menu-ambient {
            position: absolute; border-radius: 50%;
            filter: blur(100px); opacity: 0;
            transition: opacity 0.8s var(--ease-out); pointer-events: none;
        }
        .mobile-menu-overlay.active .menu-ambient { opacity: 1; }
        .menu-nav-item {
            display: block; font-family: var(--font-display);
            font-size: clamp(1.75rem, 6vw, 2.5rem); font-weight: 600;
            color: rgba(255,255,255,0.35); padding: 12px 0;
            text-decoration: none; position: relative;
            opacity: 0; transform: translateY(20px);
            transition: color 0.3s var(--ease-out);
            -webkit-tap-highlight-color: transparent;
        }
        .menu-nav-item:hover, .menu-nav-item:active { color: white; }
        .menu-nav-item::after {
            content: ''; position: absolute; left: 0; bottom: 4px;
            width: 0; height: 2px;
            background: linear-gradient(90deg, var(--clr-primary), var(--accent-cyan));
            border-radius: 2px; transition: width 0.4s var(--ease-out);
            box-shadow: 0 0 8px var(--clr-primary);
        }
        .menu-nav-item:hover::after, .menu-nav-item:active::after { width: 100%; }
        .menu-nav-item .item-index {
            display: inline-block; font-size: 10px; font-family: var(--font-base);
            font-weight: 500; color: var(--clr-primary);
            margin-right: 12px; min-width: 20px; letter-spacing: 0.05em;
        }
        .menu-nav-item .item-arrow {
            display: inline-block; margin-left: 12px;
            opacity: 0; transform: translateX(-8px);
            transition: all 0.3s var(--ease-out);
        }
        .menu-nav-item:hover .item-arrow { opacity: 0.5; transform: translateX(0); }
        .menu-cta-btn {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 14px 36px; background: var(--clr-primary);
            color: white; font-weight: 600; font-size: 15px;
            border-radius: 9999px; text-decoration: none;
            position: relative; overflow: hidden;
            opacity: 0; transform: translateY(20px);
            box-shadow: 0 0 30px rgba(77,120,255,0.25);
            transition: transform 0.3s var(--ease-out);
            -webkit-tap-highlight-color: transparent;
        }
        .menu-cta-btn:active { transform: scale(0.96) translateY(0); }
        .magnetic-btn {
            position: relative; overflow: hidden;
            transition: transform 0.4s var(--ease-out), box-shadow 0.4s var(--ease-out);
        }
        .magnetic-btn::before {
            content: ''; position: absolute; top: 50%; left: 50%;
            width: 0; height: 0; border-radius: 50%;
            background: rgba(255,255,255,0.15); transform: translate(-50%, -50%);
            transition: width 0.6s var(--ease-out), height 0.6s var(--ease-out);
        }
        .magnetic-btn:hover::before { width: 300%; height: 300%; }
        ::selection { background: rgba(77, 120, 255, 0.3); color: white; }
    </style>
</head>
<body style="background: linear-gradient(180deg, #020208 0%, #06060e 50%, #0a0a14 100%);">

    <div id="aura-bg">
        <div class="aura-blob aura-blob-1"></div>
        <div class="aura-blob aura-blob-2"></div>
        <div class="aura-blob aura-blob-3"></div>
        <div class="aura-blob aura-blob-4"></div>
        <div class="aura-blob aura-blob-5"></div>
        <div class="aura-blob aura-blob-6"></div>
    </div>
    <div id="noise-overlay"></div>
    <div id="scroll-progress"></div>

    <div id="app"></div>

    <script src="js/app.js"></script>
    <script>
    (function() {
        'use strict';
        const app = document.getElementById('app');

        app.innerHTML = `
            ${EuclidApp.buildNavbar('')}
            ${EuclidApp.buildMobileMenu('')}

            <header class="relative pt-32 pb-20 px-6 text-center overflow-hidden min-h-[70vh] flex items-center">
                <div class="absolute inset-0 z-0">
                    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[400px] h-[400px] bg-euclid/5 rounded-full blur-[120px] pointer-events-none"></div>
                </div>
                <div class="relative z-10 max-w-2xl mx-auto">
                    <div class="text-8xl md:text-9xl font-display font-bold text-white/5 mb-4 leading-none select-none">404</div>
                    <h1 class="text-4xl md:text-5xl font-display font-bold text-white mb-4">Page Not Found</h1>
                    <p class="text-lg text-euclid-muted mb-8">The page you're looking for doesn't exist or has been moved.</p>
                    <div class="flex flex-col sm:flex-row items-center justify-center gap-3">
                        <a href="index.html" class="magnetic-btn px-8 py-3.5 bg-euclid text-white font-semibold rounded-full shadow-lg shadow-euclid/20 hover:shadow-euclid/40 transition-all duration-300 hover:-translate-y-0.5 relative z-10">
                            Go Home
                        </a>
                        <a href="devices.html" class="px-8 py-3.5 border border-white/10 rounded-full font-medium text-white/70 hover:text-white hover:border-white/20 transition-all duration-300">
                            Browse Devices
                        </a>
                    </div>
                </div>
            </header>

            ${EuclidApp.buildFooter()}
        `;

        EuclidApp.initUI();
    })();
    </script>
</body>
</html>
