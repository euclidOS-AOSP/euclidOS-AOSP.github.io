<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downloads | EuclidOS</title>
    <meta name="description" content="Download the latest EuclidOS builds. Precision engineered for premium hardware.">
    <link rel="icon" type="image/jpeg" href="assets/screenshots/logo.jpeg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/lenis@1.1.13/dist/lenis.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        euclid: '#4d78ff',
                        'euclid-dark': '#03030a',
                        'euclid-muted': '#8888a0',
                        'euclid-dim': 'rgba(77, 120, 255, 0.1)',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Space Grotesk', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --clr-primary: #4d78ff;
            --clr-primary-dim: rgba(77, 120, 255, 0.1);
            --bg-main: #03030a;
            --glass-border: rgba(255, 255, 255, 0.06);
            --glass-border-hover: rgba(255, 255, 255, 0.12);
            --glow: #9ea8ff;
            --accent-cyan: #00f0ff;
            --text-muted: #8888a0;
            --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            background-color: var(--bg-main);
            color: #f0f0f5;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 10px; }
        #noise-overlay {
            position: fixed; inset: 0;
            pointer-events: none; z-index: 9999;
            opacity: 0.025;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }
        #scroll-progress {
            position: fixed; top: 0; left: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--clr-primary), var(--accent-cyan));
            z-index: 10001; width: 0%;
            box-shadow: 0 0 12px var(--clr-primary);
        }
        .glass {
            background: rgba(10, 10, 20, 0.6);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid var(--glass-border);
        }
        .glass-card {
            background: rgba(16, 16, 30, 0.5);
            backdrop-filter: blur(20px) saturate(150%);
            -webkit-backdrop-filter: blur(20px) saturate(150%);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.04);
            transition: all 0.5s var(--ease-out);
        }
        .glass-card:hover {
            border-color: var(--glass-border-hover);
            box-shadow: 0 16px 48px rgba(0,0,0,0.4), 0 0 40px var(--clr-primary-dim), inset 0 1px 0 rgba(255,255,255,0.08);
            transform: translateY(-4px);
        }
        /* ─── Aura Background System ─── */
        #aura-bg {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 0; pointer-events: none; overflow: hidden;
        }
        .aura-blob {
            position: absolute; border-radius: 50%;
            will-change: transform, opacity;
            filter: blur(150px);
            mix-blend-mode: screen;
        }
        .aura-blob-1 {
            width: 950px; height: 950px;
            background: radial-gradient(circle, rgba(77,120,255,0.42) 0%, rgba(77,120,255,0.1) 35%, transparent 70%);
            top: -280px; left: -200px;
            animation: auraDrift1 20s ease-in-out infinite alternate;
        }
        .aura-blob-2 {
            width: 800px; height: 800px;
            background: radial-gradient(circle, rgba(108,92,231,0.36) 0%, rgba(108,92,231,0.08) 35%, transparent 70%);
            top: 15%; right: -250px;
            animation: auraDrift2 28s ease-in-out infinite alternate;
        }
        .aura-blob-3 {
            width: 700px; height: 700px;
            background: radial-gradient(circle, rgba(0,123,255,0.34) 0%, rgba(0,123,255,0.07) 35%, transparent 70%);
            top: 50%; left: -180px;
            animation: auraDrift3 38s ease-in-out infinite alternate;
        }
        .aura-blob-4 {
            width: 850px; height: 850px;
            background: radial-gradient(circle, rgba(0,240,255,0.25) 0%, rgba(0,240,255,0.06) 35%, transparent 70%);
            bottom: -220px; right: -200px;
            animation: auraDrift4 14s ease-in-out infinite alternate;
        }
        .aura-blob-5 {
            width: 650px; height: 650px;
            background: radial-gradient(circle, rgba(138,79,255,0.28) 0%, rgba(138,79,255,0.06) 35%, transparent 70%);
            top: 35%; left: 40%;
            animation: auraDrift5 24s ease-in-out infinite alternate;
        }
        .aura-blob-6 {
            width: 550px; height: 550px;
            background: radial-gradient(circle, rgba(59,130,246,0.22) 0%, rgba(59,130,246,0.05) 35%, transparent 70%);
            top: 70%; left: 55%;
            animation: auraDrift6 32s ease-in-out infinite alternate;
        }

        @keyframes auraDrift1 {
            0%   { transform: translate3d(0, 0, 0) scale(1) rotate(0deg); }
            25%  { transform: translate3d(180px, -220px, 0) scale(1.12) rotate(10deg); }
            50%  { transform: translate3d(-140px, 160px, 0) scale(0.88) rotate(-8deg); }
            75%  { transform: translate3d(100px, -120px, 0) scale(1.18) rotate(14deg); }
            100% { transform: translate3d(-100px, 100px, 0) scale(1) rotate(0deg); }
        }
        @keyframes auraDrift2 {
            0%   { transform: translate3d(0, 0, 0) scale(1) rotate(0deg); }
            30%  { transform: translate3d(-240px, 180px, 0) scale(1.14) rotate(-12deg); }
            60%  { transform: translate3d(170px, -150px, 0) scale(0.86) rotate(10deg); }
            100% { transform: translate3d(-80px, 120px, 0) scale(1.08) rotate(-4deg); }
        }
        @keyframes auraDrift3 {
            0%   { transform: translate3d(0, 0, 0) scale(1) rotate(0deg); }
            20%  { transform: translate3d(150px, 200px, 0) scale(1.1) rotate(8deg); }
            50%  { transform: translate3d(-200px, -100px, 0) scale(0.88) rotate(-12deg); }
            80%  { transform: translate3d(130px, -170px, 0) scale(1.16) rotate(14deg); }
            100% { transform: translate3d(-60px, 80px, 0) scale(1) rotate(0deg); }
        }
        @keyframes auraDrift4 {
            0%   { transform: translate3d(0, 0, 0) scale(1) rotate(0deg); }
            35%  { transform: translate3d(-210px, -190px, 0) scale(1.16) rotate(-14deg); }
            70%  { transform: translate3d(170px, 130px, 0) scale(0.86) rotate(12deg); }
            100% { transform: translate3d(-100px, -80px, 0) scale(1.08) rotate(-4deg); }
        }
        @keyframes auraDrift5 {
            0%   { transform: translate3d(0, 0, 0) scale(1) rotate(0deg); }
            40%  { transform: translate3d(-180px, 230px, 0) scale(1.12) rotate(10deg); }
            75%  { transform: translate3d(220px, -130px, 0) scale(0.85) rotate(-14deg); }
            100% { transform: translate3d(-80px, 150px, 0) scale(1.1) rotate(4deg); }
        }
        @keyframes auraDrift6 {
            0%   { transform: translate3d(0, 0, 0) scale(1) rotate(0deg); }
            25%  { transform: translate3d(130px, -210px, 0) scale(1.14) rotate(-10deg); }
            55%  { transform: translate3d(-150px, 170px, 0) scale(0.87) rotate(14deg); }
            85%  { transform: translate3d(190px, 80px, 0) scale(1.08) rotate(-8deg); }
            100% { transform: translate3d(-60px, -100px, 0) scale(1) rotate(0deg); }
        }
        .reveal-section { opacity: 0; transform: translateY(30px); }
        #navbar { transition: transform 0.4s var(--ease-out), opacity 0.4s var(--ease-out); will-change: transform; }
        #nav-glass { transition: opacity 0.4s var(--ease-out); }
        .nav-link {
            position: relative; padding: 8px 16px;
            font-size: 13px; font-weight: 500;
            color: rgba(255,255,255,0.6);
            border-radius: 9999px;
            transition: color 0.3s, background-color 0.3s;
        }
        .nav-link:hover { color: #fff; background-color: rgba(255,255,255,0.08); }
        .nav-link::after {
            content: ''; position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%);
            width: 0; height: 1px; background: var(--clr-primary);
            transition: width 0.3s var(--ease-out);
        }
        .nav-link:hover::after { width: 16px; }
        .ham-btn {
            width: 44px; height: 44px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 5px; position: relative;
            border-radius: 12px; background: transparent;
            border: 1px solid transparent;
            transition: all 0.4s var(--ease-out);
            -webkit-tap-highlight-color: transparent; cursor: pointer;
        }
        .ham-btn:active { transform: scale(0.92); }
        .ham-btn .ham-line {
            display: block; width: 20px; height: 1.5px;
            background: white; border-radius: 4px;
            transition: all 0.5s var(--ease-out);
            transform-origin: center; position: absolute;
        }
        .ham-btn .ham-line:nth-child(1) { transform: translateY(-6px); }
        .ham-btn .ham-line:nth-child(2) { transform: translateY(0); }
        .ham-btn .ham-line:nth-child(3) { transform: translateY(6px); }
        .ham-btn.ham-open .ham-line:nth-child(1) { transform: translateY(0) rotate(45deg); }
        .ham-btn.ham-open .ham-line:nth-child(2) { opacity: 0; transform: scaleX(0); }
        .ham-btn.ham-open .ham-line:nth-child(3) { transform: translateY(0) rotate(-45deg); }
        .ham-btn.ham-open { background: rgba(77,120,255,0.12); border-color: rgba(77,120,255,0.25); }
        .ham-btn .ham-glow {
            position: absolute; inset: -4px; border-radius: 16px;
            background: radial-gradient(circle, rgba(77,120,255,0.25), transparent 70%);
            opacity: 0; transition: opacity 0.4s; pointer-events: none;
        }
        .ham-btn.ham-open .ham-glow { opacity: 1; }
        .tilt-card {
            transform-style: preserve-3d;
            transition: transform 0.15s linear;
            will-change: transform;
        }
        .tilt-card .glow-border {
            position: absolute; inset: -1px; border-radius: inherit;
            background: conic-gradient(from 0deg, transparent, 60%, var(--clr-primary), transparent);
            opacity: 0; transition: opacity 0.6s var(--ease-out); z-index: -1;
        }
        .tilt-card:hover .glow-border { opacity: 0.5; }
        .magnetic-btn {
            position: relative; overflow: hidden;
            transition: transform 0.4s var(--ease-out), box-shadow 0.4s var(--ease-out);
        }
        .magnetic-btn::before {
            content: ''; position: absolute; top: 50%; left: 50%;
            width: 0; height: 0; border-radius: 50%;
            background: rgba(255,255,255,0.15); transform: translate(-50%, -50%);
            transition: width 0.6s var(--ease-out), height 0.6s var(--ease-out);
        }
        .magnetic-btn:hover::before { width: 300%; height: 300%; }
        .mobile-menu-overlay { position: fixed; inset: 0; pointer-events: none; }
        .mobile-menu-overlay.active { pointer-events: auto; }
        .menu-backdrop {
            position: absolute; inset: 0;
            background: rgba(2,2,8,0.7);
            backdrop-filter: blur(12px) saturate(120%);
            -webkit-backdrop-filter: blur(12px) saturate(120%);
            opacity: 0; transition: opacity 0.5s var(--ease-out);
        }
        .mobile-menu-overlay.active .menu-backdrop { opacity: 1; }
        .menu-panel {
            position: absolute; inset: 0;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 80px 32px 48px;
            opacity: 0; transform: scale(0.96);
            transition: all 0.5s var(--ease-out); pointer-events: none;
        }
        .mobile-menu-overlay.active .menu-panel { opacity: 1; transform: scale(1); pointer-events: auto; }
        .menu-ambient {
            position: absolute; border-radius: 50%;
            filter: blur(100px); opacity: 0;
            transition: opacity 0.8s var(--ease-out); pointer-events: none;
        }
        .mobile-menu-overlay.active .menu-ambient { opacity: 1; }
        .menu-nav-item {
            display: block; font-family: var(--font-display);
            font-size: clamp(1.75rem, 6vw, 2.5rem); font-weight: 600;
            color: rgba(255,255,255,0.35); padding: 12px 0;
            text-decoration: none; position: relative;
            opacity: 0; transform: translateY(20px);
            transition: color 0.3s var(--ease-out);
            -webkit-tap-highlight-color: transparent;
        }
        .menu-nav-item:hover, .menu-nav-item:active { color: white; }
        .menu-nav-item::after {
            content: ''; position: absolute; left: 0; bottom: 4px;
            width: 0; height: 2px;
            background: linear-gradient(90deg, var(--clr-primary), var(--accent-cyan));
            border-radius: 2px; transition: width 0.4s var(--ease-out);
            box-shadow: 0 0 8px var(--clr-primary);
        }
        .menu-nav-item:hover::after, .menu-nav-item:active::after { width: 100%; }
        .menu-nav-item .item-index {
            display: inline-block; font-size: 10px; font-family: var(--font-base);
            font-weight: 500; color: var(--clr-primary);
            margin-right: 12px; min-width: 20px; letter-spacing: 0.05em;
        }
        .menu-nav-item .item-arrow {
            display: inline-block; margin-left: 12px;
            opacity: 0; transform: translateX(-8px);
            transition: all 0.3s var(--ease-out);
        }
        .menu-nav-item:hover .item-arrow { opacity: 0.5; transform: translateX(0); }
        .menu-cta-btn {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 14px 36px; background: var(--clr-primary);
            color: white; font-weight: 600; font-size: 15px;
            border-radius: 9999px; text-decoration: none;
            position: relative; overflow: hidden;
            opacity: 0; transform: translateY(20px);
            box-shadow: 0 0 30px rgba(77,120,255,0.25);
            transition: transform 0.3s var(--ease-out);
            -webkit-tap-highlight-color: transparent;
        }
        .menu-cta-btn:active { transform: scale(0.96) translateY(0); }
        .menu-footer { opacity: 0; transform: translateY(10px); }
        .menu-footer a { color: rgba(255,255,255,0.25); transition: color 0.3s; -webkit-tap-highlight-color: transparent; }
        .menu-footer a:hover { color: var(--clr-primary); }
        ::selection { background: rgba(77, 120, 255, 0.3); color: white; }
    </style>
</head>
<body style="background: linear-gradient(180deg, #020208 0%, #06060e 50%, #0a0a14 100%);">

    <div id="aura-bg">
        <div class="aura-blob aura-blob-1"></div>
        <div class="aura-blob aura-blob-2"></div>
        <div class="aura-blob aura-blob-3"></div>
        <div class="aura-blob aura-blob-4"></div>
        <div class="aura-blob aura-blob-5"></div>
        <div class="aura-blob aura-blob-6"></div>
    </div>

    <div id="noise-overlay"></div>
    <div id="scroll-progress"></div>

    <div id="app"></div>

    <script src="js/app.js"></script>
    <script>
    (function() {
        'use strict';

        const app = document.getElementById('app');

        async function init() {
            app.innerHTML = `
                ${EuclidApp.buildNavbar('downloads')}
                ${EuclidApp.buildMobileMenu('downloads')}

                <!-- Hero -->
                <header class="relative pt-32 pb-20 px-6 text-center overflow-hidden">
                    <div class="absolute inset-0 z-0">
                        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-euclid/10 rounded-full blur-[120px] pointer-events-none"></div>
                    </div>
                    <div class="relative z-10 max-w-3xl mx-auto">
                        <div class="inline-flex items-center gap-2.5 bg-white/[0.04] border border-white/[0.08] rounded-full px-4 py-2 mb-8 reveal-section">
                            <span class="relative flex h-2.5 w-2.5">
                                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                                <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-green-400"></span>
                            </span>
                            <span class="text-sm text-gray-300 font-medium tracking-wide">EXCLUSIVE BUILDS</span>
                        </div>
                        <h1 class="text-4xl md:text-6xl lg:text-7xl font-display font-bold mb-6 reveal-section leading-[1.05]">
                            Official <span class="text-transparent bg-clip-text bg-gradient-to-r from-euclid to-cyan-400">Builds.</span>
                        </h1>
                        <p class="text-base md:text-lg text-euclid-muted max-w-xl mx-auto mb-10 reveal-section leading-relaxed">
                            Select your device to download the latest EuclidOS release. Engineered with precision for peak performance.
                        </p>
                        <div class="flex flex-wrap justify-center gap-2.5 reveal-section">
                            <span class="px-3 py-1 rounded-full text-xs font-medium border border-euclid/40 text-euclid bg-euclid/[0.08] backdrop-blur-sm">Fast</span>
                            <span class="px-3 py-1 rounded-full text-xs font-medium border border-green-400/40 text-green-400 bg-green-400/[0.08] backdrop-blur-sm">Stable</span>
                            <span class="px-3 py-1 rounded-full text-xs font-medium border border-cyan-400/40 text-cyan-400 bg-cyan-400/[0.08] backdrop-blur-sm">Secure</span>
                        </div>
                    </div>
                </header>

                <!-- Builds -->
                <main class="max-w-7xl mx-auto px-6 pb-20 relative z-10">
                    <div id="builds-grid" class="grid lg:grid-cols-3 gap-5 mb-14"></div>

                    <!-- Community CTA -->
                    <div class="glass-card rounded-[2rem] p-10 md:p-14 text-center relative overflow-hidden reveal-section">
                        <div class="absolute -inset-20 bg-gradient-to-br from-euclid/10 to-cyan-500/[0.05] blur-3xl pointer-events-none"></div>
                        <div class="relative z-10">
                            <div class="inline-block p-3.5 rounded-full bg-euclid/[0.08] border border-euclid/15 mb-5">
                                <span class="text-3xl">&#128226;</span>
                            </div>
                            <h3 class="text-2xl md:text-3xl font-display font-bold mb-3">Community Driven.</h3>
                            <p class="text-euclid-muted max-w-md mx-auto mb-7 text-sm leading-relaxed">We are actively looking for passionate maintainers to bring EuclidOS to a wider range of premium hardware. Ready to build for your device?</p>
                            <div class="flex flex-col sm:flex-row justify-center gap-3">
                                <a href="devices.html" class="magnetic-btn inline-flex items-center justify-center gap-2 px-7 py-3.5 bg-euclid text-white font-semibold rounded-full hover:bg-euclid/90 transition-all duration-300 shadow-lg shadow-euclid/15 hover:shadow-euclid/30 hover:-translate-y-0.5 text-sm relative z-10">View All Devices</a>
                                <a href="https://github.com/MODEDGES" target="_blank" class="inline-flex items-center justify-center gap-2 px-7 py-3.5 border border-white/10 text-white/80 font-medium rounded-full hover:border-white/20 hover:bg-white/[0.03] transition-all duration-300 text-sm">Contact Us</a>
                            </div>
                        </div>
                    </div>
                </main>

                ${EuclidApp.buildFooter()}
            `;

            const devicesWithDownloads = await EuclidApp.getDevicesWithDownloads();

            const grid = document.getElementById('builds-grid');

            if (devicesWithDownloads.length === 0) {
                grid.innerHTML = `
                    <div class="lg:col-span-3 glass-card rounded-[2rem] p-14 text-center">
                        <div class="text-5xl mb-4 opacity-30">&#128241;</div>
                        <h3 class="text-xl font-display font-bold text-gray-500 mb-2">No builds available yet</h3>
                        <p class="text-sm text-gray-600">Check back later for download links.</p>
                    </div>
                `;
            } else {
                grid.innerHTML = devicesWithDownloads.map((d, i) => {
                    const dl = d.download;
                    const isActive = d.active;
                    const isPrimary = i === 0;
                    return `
                        <div class="${isPrimary ? 'lg:col-span-2' : ''} glass-card rounded-[2rem] p-7 md:p-${isPrimary ? '10' : '7'} relative overflow-hidden group reveal-section tilt-card">
                            <div class="glow-border group-hover:opacity-50"></div>
                            ${isPrimary ? '<div class="absolute -top-20 -right-20 w-56 h-56 bg-euclid/[0.07] rounded-full blur-[80px] pointer-events-none group-hover:opacity-80 transition-opacity duration-700"></div>' : ''}
                            <div class="absolute top-5 right-5">
                                ${EuclidApp.downloadStatusBadge(dl.status)}
                            </div>
                            <div class="flex flex-col ${isPrimary ? 'md:flex-row md:items-center gap-6 md:gap-8' : 'items-center text-center'} relative">
                                <div class="flex-shrink-0">
                                    <div class="w-${isPrimary ? '20 h-20 md:w-28 md:h-28' : '14 h-14 md:w-16 md:h-16'} bg-gradient-to-br from-euclid/15 to-blue-500/[0.08] rounded-2xl flex items-center justify-center border border-euclid/15 group-hover:border-euclid/30 transition-all duration-300 relative">
                                        <span class="text-${isPrimary ? '4xl md:text-5xl' : '2xl md:text-3xl'}">&#128241;</span>
                                        ${isActive ? '<div class="absolute -top-1.5 -right-1.5 w-5 h-5 bg-green-400 border-[3px] border-[#07070f] rounded-full shadow-lg shadow-green-400/30"></div>' : '<div class="absolute -top-1.5 -right-1.5 w-4 h-4 bg-red-400/70 border-[2px] border-[#07070f] rounded-full"></div>'}
                                    </div>
                                </div>
                                <div class="flex-1">
                                    <h2 class="${isPrimary ? 'text-2xl md:text-3xl' : 'text-lg md:text-xl'} font-display font-bold mb-1.5">${d.device_name}</h2>
                                    <p class="text-euclid-muted ${isPrimary ? 'mb-4' : 'mb-3'}">
                                        <span class="px-2 py-0.5 bg-white/[0.04] rounded text-xs font-mono text-gray-400 border border-white/[0.06]">${d.codename}</span>
                                    </p>
                                    <div class="space-y-2 ${isPrimary ? 'mb-7' : 'mb-4'}">
                                        <div class="flex items-center justify-between text-sm py-1.5 border-b border-white/[0.04]">
                                            <span class="text-gray-500 text-xs">Version</span>
                                            <span class="font-medium text-white/90 font-mono text-xs">${dl.version}</span>
                                        </div>
                                        <div class="flex items-center justify-between text-sm py-1.5 border-b border-white/[0.04]">
                                            <span class="text-gray-500 text-xs">Maintainer</span>
                                            <span class="font-medium text-white/90 text-xs">${d.maintainer}</span>
                                        </div>
                                        <div class="flex items-center justify-between text-sm py-1.5">
                                            <span class="text-gray-500 text-xs">Updated</span>
                                            <span class="font-medium text-white/90 text-xs">${EuclidApp.formatDate(dl.last_updated)}</span>
                                        </div>
                                    </div>
                                    <div class="flex ${isPrimary ? 'flex-col sm:flex-row' : 'flex-col'} gap-3">
                                        <a href="${dl.download_link}" target="_blank" rel="noopener noreferrer" class="magnetic-btn ${isPrimary ? 'flex-1' : 'w-full'} py-3.5 bg-euclid text-white font-semibold rounded-xl text-center hover:bg-euclid/90 transition-all duration-300 shadow-lg shadow-euclid/15 hover:shadow-euclid/30 hover:scale-[1.02] hover:-translate-y-0.5 text-sm relative z-10">Download Build</a>
                                        <a href="device.html?codename=${d.codename}" class="${isPrimary ? 'flex-1' : 'w-full'} py-3.5 border border-white/[0.08] text-white/90 font-semibold rounded-xl text-center hover:border-white/20 hover:bg-white/[0.03] transition-all duration-300 text-sm">Details</a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');

                // Add a "Coming Soon" placeholder if only 1 device
                if (devicesWithDownloads.length === 1) {
                    grid.innerHTML += `
                        <div class="flex flex-col gap-5">
                            <div class="glass-card rounded-[2rem] p-7 text-center opacity-50 border-dashed border-white/[0.06] group reveal-section relative">
                                <div class="w-14 h-14 bg-white/[0.03] rounded-xl flex items-center justify-center border border-dashed border-white/15 mx-auto mb-4">
                                    <span class="text-2xl text-gray-600">?</span>
                                </div>
                                <h3 class="text-lg font-bold text-gray-500 mb-1.5">Expanding...</h3>
                                <p class="text-[10px] text-gray-600 font-semibold uppercase tracking-[0.2em] mb-5">Next device in testing</p>
                                <div class="space-y-2 mb-5">
                                    <div class="flex justify-between text-xs text-gray-600"><span>Status</span><span>Testing</span></div>
                                    <div class="w-full bg-white/[0.04] rounded-full h-1.5"><div class="bg-gray-700 h-1.5 rounded-full w-1/3 animate-pulse"></div></div>
                                </div>
                                <button class="w-full py-3.5 border border-white/[0.06] text-gray-500 font-semibold rounded-xl cursor-not-allowed text-sm">Coming Soon</button>
                            </div>
                        </div>
                    `;
                }
            }

            EuclidApp.initUI();
        }

        init();
    })();
    </script>
</body>
</html>
