<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EuclidOS | Precision & Performance</title>
    <link rel="icon" type="image/jpeg" href="assets/screenshots/logo.jpeg">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0a0a; color: #eee; overflow-x: hidden; }
        .hero-gradient { background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%); }
        .text-euclid { color: #4370ff; }
        .bg-euclid { background-color: #4370ff; }
        
        /* Drawer Animation */
        #side-drawer {
            transform: translateX(100%);
            transition: transform 0.3s ease-in-out;
        }
        #side-drawer.open { transform: translateX(0); }
    </style>
</head>
<body class="font-sans antialiased">

    <nav class="p-6 flex justify-between items-center max-w-6xl mx-auto relative z-10">
        <div class="flex items-center gap-3">
            <img src="assets/screenshots/logo.jpeg" alt="Logo" class="w-8 h-8 rounded">
            <div class="text-2xl font-bold tracking-tighter text-euclid">EUCLID<span class="text-white">OS</span></div>
        </div>
        
        <button id="menu-btn" class="p-2 focus:outline-none">
            <div class="w-6 h-0.5 bg-white mb-1.5"></div>
            <div class="w-6 h-0.5 bg-white mb-1.5"></div>
            <div class="w-6 h-0.5 bg-white"></div>
        </button>
    </nav>

    <div id="side-drawer" class="fixed top-0 right-0 h-full w-64 bg-zinc-900 border-l border-zinc-800 z-50 p-8 shadow-2xl">
        <button id="close-btn" class="text-gray-400 mb-8 hover:text-white">✕ Close</button>
        <div class="flex flex-col gap-8 text-xl font-bold">
            <a href="index.html" class="hover:text-euclid transition">Home</a>
            <a href="screenshots.html" class="hover:text-euclid transition">Screenshots</a>
            <a href="downloads.html" class="hover:text-euclid transition text-euclid">Downloads</a>
            <hr class="border-zinc-800">
            <a href="https://github.com/euclidOS-AOSP" class="text-sm text-gray-500 hover:text-white">GitHub Source</a>
        </div>
    </div>

    <header class="hero-gradient py-24 px-6 text-center">
        <h1 class="text-5xl md:text-7xl font-extrabold mb-6 tracking-tight">
            Geometry in <span class="text-euclid">Motion.</span>
        </h1>
        <p class="text-gray-400 text-lg md:text-xl max-w-2xl mx-auto mb-10">
            A refined AOSP-based experience focusing on precision, speed, and geometric aesthetics.
        </p>
        <div class="flex flex-col items-center gap-4">
            <a href="downloads.html" class="bg-white text-black px-12 py-4 rounded-full font-bold text-lg hover:bg-gray-200 transition">Get EuclidOS</a>
        </div>
    </header>

    <script>
        const menuBtn = document.getElementById('menu-btn');
        const closeBtn = document.getElementById('close-btn');
        const drawer = document.getElementById('side-drawer');

        menuBtn.addEventListener('click', () => drawer.classList.add('open'));
        closeBtn.addEventListener('click', () => drawer.classList.remove('open'));
        
        // Close drawer if clicking outside
        document.addEventListener('click', (e) => {
            if (!drawer.contains(e.target) && !menuBtn.contains(e.target)) {
                drawer.classList.remove('open');
            }
        });
    </script>
</body>
</html>
