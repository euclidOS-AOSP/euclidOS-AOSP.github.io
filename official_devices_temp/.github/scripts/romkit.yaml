bot_username: "euclidOSbot"

chat_ids:
  - -1002185368709

rom_name: "EuclidOS"

website_url: "https://euclidos.org"

json_directories:
  Dir: "./builds"

device_json_structure: {
  "maintainer": "",
  "oem": "",
  "device": "",
  "version": "",
  "filename": "",
  "download": "",
  "timestamp": 0,
  "md5": "",
  "sha256": "",
  "size": 0,
  "telegram": "",
  "support": ""
}

id_field: "sha256"

message_template: |
  **EuclidOS {version} OFFICIAL - Android 16**
  📲 : {device} ({bot_codename})
  🧑‍💼 : [{maintainer}](https://t.me/{telegram})
  📅 : {timestamp | dateformat("%Y-%m-%d %H:%M:%S %Z")} UTC

  ▪️ Changelog: [Source](https://www.euclidos.org/changelogs/) | [Device](https://www.euclidos.org/downloads/{bot_codename}/#changelogs)  
  ▪️ Download: [Here](https://www.euclidos.org/downloads/{bot_codename}/)

  ▪️ Rom Support: [Here](https://t.me/euclidoschat)
  ▪️ Device Support: [Here]({support})

  #euclidOS #{bot_codename} #Android16 #Official

file_ids_path: "./.github/scripts/file_ids.txt"

banner_path: "./assets/banner.png"

version_repo: "euclidOS-AOSP/vendor_euclid"
version_file: "config/version.mk"
version_template: "{EUCLID_VERSION}"
version_field: "version"

device_name_field: "device"
maintainer_telegram_field: "telegram"
